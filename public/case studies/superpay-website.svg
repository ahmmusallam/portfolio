<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SuperPay Website — marketing site wireframe">
  <defs>
    <pattern id="spw-dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.7" fill="#1f1f1f"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="#0a0a0a"/>
  <rect width="800" height="500" fill="url(#spw-dots)" opacity="0.6"/>

  <!-- Corner marks -->
  <g stroke="#525252" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 36 50 L 36 36 L 50 36"/>
    <path d="M 750 36 L 764 36 L 764 50"/>
    <path d="M 36 450 L 36 464 L 50 464"/>
    <path d="M 750 464 L 764 464 L 764 450"/>
  </g>

  <!-- Header -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
    <text x="80" y="95" font-size="13" letter-spacing="3" font-weight="500" fill="#888888">SUPERPAY</text>
    <text x="184" y="95" font-size="13" letter-spacing="3" fill="#3a3a3a">·</text>
    <text x="200" y="95" font-size="13" letter-spacing="3" fill="#525252">MARKETING SITE</text>
    <line x1="80" y1="116" x2="720" y2="116" stroke="#1a1a1a"/>
  </g>

  <!-- Page container (browser-window feel) -->
  <g transform="translate(80, 142)">
    <rect width="640" height="290" fill="none" stroke="#262626"/>

    <!-- Top nav strip -->
    <g>
      <line x1="0" y1="38" x2="640" y2="38" stroke="#1a1a1a"/>
      <!-- Logo dot -->
      <circle cx="20" cy="19" r="5" fill="#888888"/>
      <rect x="32" y="15" width="44" height="8" rx="1" fill="#525252"/>
      <!-- Nav links -->
      <rect x="320" y="16" width="36" height="6" rx="1" fill="#404040"/>
      <rect x="368" y="16" width="42" height="6" rx="1" fill="#404040"/>
      <rect x="422" y="16" width="40" height="6" rx="1" fill="#404040"/>
      <rect x="474" y="16" width="36" height="6" rx="1" fill="#404040"/>
      <!-- CTA pill -->
      <rect x="554" y="10" width="68" height="20" rx="1" fill="#fafafa"/>
      <rect x="568" y="18" width="40" height="4" rx="1" fill="#0a0a0a"/>
    </g>

    <!-- Hero section -->
    <g transform="translate(40, 70)">
      <!-- Eyebrow label -->
      <rect x="0" y="0" width="80" height="6" rx="1" fill="#525252"/>

      <!-- Big headline (3 stacked bars) -->
      <rect x="0" y="20" width="380" height="18" rx="1" fill="#fafafa"/>
      <rect x="0" y="48" width="320" height="18" rx="1" fill="#fafafa"/>
      <rect x="0" y="76" width="220" height="18" rx="1" fill="#a3a3a3"/>

      <!-- Subtitle -->
      <rect x="0" y="112" width="420" height="6" rx="1" fill="#404040"/>
      <rect x="0" y="126" width="360" height="6" rx="1" fill="#404040"/>

      <!-- CTA + secondary -->
      <rect x="0" y="148" width="110" height="26" rx="1" fill="#fafafa"/>
      <rect x="14" y="158" width="64" height="6" rx="1" fill="#0a0a0a"/>
      <rect x="128" y="158" width="90" height="6" rx="1" fill="#666666"/>
    </g>

    <!-- Right-side device mock (abstract phone) -->
    <g transform="translate(490, 70)">
      <rect width="100" height="160" rx="6" fill="none" stroke="#404040"/>
      <line x1="0" y1="28" x2="100" y2="28" stroke="#1a1a1a"/>
      <rect x="12" y="40" width="76" height="6" rx="1" fill="#525252"/>
      <rect x="12" y="56" width="62" height="6" rx="1" fill="#404040"/>
      <rect x="12" y="78" width="76" height="36" rx="1" fill="#181818" stroke="#262626"/>
      <rect x="12" y="124" width="56" height="6" rx="1" fill="#404040"/>
      <rect x="12" y="138" width="44" height="6" rx="1" fill="#404040"/>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="470" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="10" letter-spacing="3" fill="#3a3a3a">MARKETING SITE · 04</text>
</svg>
