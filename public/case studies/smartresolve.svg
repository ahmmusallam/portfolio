<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SmartResolve — AI crash fix flow">
  <defs>
    <pattern id="smr-dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.7" fill="#1f1f1f"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="#0a0a0a"/>
  <rect width="800" height="500" fill="url(#smr-dots)" opacity="0.6"/>

  <!-- Corner marks -->
  <g stroke="#525252" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 36 50 L 36 36 L 50 36"/>
    <path d="M 750 36 L 764 36 L 764 50"/>
    <path d="M 36 450 L 36 464 L 50 464"/>
    <path d="M 750 464 L 764 464 L 764 450"/>
  </g>

  <!-- Header -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
    <text x="80" y="95" font-size="13" letter-spacing="3" font-weight="500" fill="#888888">SMARTRESOLVE</text>
    <text x="220" y="95" font-size="13" letter-spacing="3" fill="#3a3a3a">·</text>
    <text x="236" y="95" font-size="13" letter-spacing="3" fill="#525252">AI CRASH FIX</text>
    <line x1="80" y1="116" x2="720" y2="116" stroke="#1a1a1a"/>
  </g>

  <!-- Root cause callout -->
  <g transform="translate(80, 142)" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
    <rect width="640" height="48" fill="none" stroke="#262626"/>
    <text x="14" y="18" font-size="10" letter-spacing="2" fill="#666666">ROOT CAUSE</text>
    <text x="14" y="37" font-size="12" letter-spacing="1" fill="#bbbbbb">NSInvalidArgument · component cleanup leak</text>
    <g transform="translate(556, 13)">
      <rect width="68" height="22" rx="1" fill="none" stroke="#525252"/>
      <text x="13" y="15" font-size="10" letter-spacing="1.5" fill="#d4d4d4">AI ✦</text>
    </g>
  </g>

  <!-- Code diff lines -->
  <g transform="translate(80, 212)" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
    <!-- Line 4 normal -->
    <g>
      <text x="22" y="14" font-size="11" fill="#525252" text-anchor="end">4</text>
      <line x1="32" y1="0" x2="32" y2="22" stroke="#1a1a1a"/>
      <rect x="50" y="7" width="260" height="6" rx="1" fill="#404040"/>
      <rect x="316" y="7" width="74" height="6" rx="1" fill="#262626"/>
    </g>
    <!-- Line 5 normal -->
    <g transform="translate(0, 24)">
      <text x="22" y="14" font-size="11" fill="#525252" text-anchor="end">5</text>
      <line x1="32" y1="0" x2="32" y2="22" stroke="#1a1a1a"/>
      <rect x="50" y="7" width="180" height="6" rx="1" fill="#404040"/>
    </g>
    <!-- Line - removed -->
    <g transform="translate(0, 48)">
      <rect x="0" y="0" width="640" height="22" fill="#171717"/>
      <text x="22" y="15" font-size="13" font-weight="600" fill="#666666" text-anchor="end">−</text>
      <line x1="32" y1="0" x2="32" y2="22" stroke="#262626"/>
      <rect x="50" y="7" width="140" height="6" rx="1" fill="#2a2a2a"/>
    </g>
    <!-- Line + added -->
    <g transform="translate(0, 72)">
      <rect x="0" y="0" width="640" height="22" fill="#191919"/>
      <text x="22" y="15" font-size="13" font-weight="600" fill="#fafafa" text-anchor="end">+</text>
      <line x1="32" y1="0" x2="32" y2="22" stroke="#525252"/>
      <rect x="50" y="7" width="240" height="6" rx="1" fill="#888888"/>
      <rect x="296" y="7" width="86" height="6" rx="1" fill="#666666"/>
    </g>
    <!-- Line + added -->
    <g transform="translate(0, 96)">
      <rect x="0" y="0" width="640" height="22" fill="#191919"/>
      <text x="22" y="15" font-size="13" font-weight="600" fill="#fafafa" text-anchor="end">+</text>
      <line x1="32" y1="0" x2="32" y2="22" stroke="#525252"/>
      <rect x="50" y="7" width="200" height="6" rx="1" fill="#888888"/>
    </g>
    <!-- Line 8 normal -->
    <g transform="translate(0, 120)">
      <text x="22" y="14" font-size="11" fill="#525252" text-anchor="end">8</text>
      <line x1="32" y1="0" x2="32" y2="22" stroke="#1a1a1a"/>
      <rect x="50" y="7" width="220" height="6" rx="1" fill="#404040"/>
    </g>
  </g>

  <!-- Iteration row -->
  <g transform="translate(80, 388)" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
    <text x="0" y="15" font-size="11" letter-spacing="2" fill="#a3a3a3">ITERATION 03 / 05</text>
    <g transform="translate(170, 10)">
      <circle cx="0" cy="0" r="4" fill="#fafafa"/>
      <circle cx="18" cy="0" r="4" fill="#fafafa"/>
      <circle cx="36" cy="0" r="4" fill="#fafafa"/>
      <circle cx="54" cy="0" r="4" fill="none" stroke="#525252" stroke-width="1.5"/>
      <circle cx="72" cy="0" r="4" fill="none" stroke="#525252" stroke-width="1.5"/>
    </g>
    <g transform="translate(500, 0)">
      <rect width="140" height="24" rx="1" fill="none" stroke="#525252"/>
      <text x="16" y="16" font-size="10" letter-spacing="1.5" fill="#d4d4d4">REGENERATE FIX ↻</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="470" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="10" letter-spacing="3" fill="#3a3a3a">AI FIX FLOW · 02</text>
</svg>
