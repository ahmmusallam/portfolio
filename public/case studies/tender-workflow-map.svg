<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none" role="img" aria-label="Tender lifecycle journey map: five phases from independent reading to final bid, with a cycle loop showing Q&amp;A rounds repeating.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Header -->
  <text x="800" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#F3F4F6" text-anchor="middle">
    The tender lifecycle, end-to-end
  </text>
  <text x="800" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#9CA3AF" text-anchor="middle">
    Five phases. The middle three can repeat across multiple Q&amp;A rounds before the final bid.
  </text>

  <!-- Phase 1: Coral · Independent reading -->
  <g transform="translate(45, 180)" filter="url(#cardShadow)">
    <rect width="270" height="240" rx="24" fill="#F87171"/>
    <text x="24" y="40" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#7F1D1D" letter-spacing="1.6" font-weight="600">PHASE / 01</text>
    <line x1="24" y1="52" x2="60" y2="52" stroke="#7F1D1D" stroke-width="2" opacity="0.6"/>
    <text x="24" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#7F1D1D">Independent</text>
    <text x="24" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#7F1D1D">reading</text>
    <text x="24" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7F1D1D" opacity="0.9">Everyone reads the tender</text>
    <text x="24" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7F1D1D" opacity="0.9">on their own, in their own</text>
    <text x="24" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7F1D1D" opacity="0.9">way.</text>
    <text x="24" y="225" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#7F1D1D" opacity="0.65">3 steps</text>
  </g>
  <path d="M 320 300 L 350 300" stroke="#9CA3AF" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Phase 2: Amber · Drafting questions together -->
  <g transform="translate(355, 180)" filter="url(#cardShadow)">
    <rect width="270" height="240" rx="24" fill="#FBBF24"/>
    <text x="24" y="40" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#78350F" letter-spacing="1.6" font-weight="600">PHASE / 02</text>
    <line x1="24" y1="52" x2="60" y2="52" stroke="#78350F" stroke-width="2" opacity="0.6"/>
    <text x="24" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#78350F">Drafting</text>
    <text x="24" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#78350F">questions</text>
    <text x="24" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#78350F" opacity="0.9">Cross-functional teams</text>
    <text x="24" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#78350F" opacity="0.9">align, draft, and submit</text>
    <text x="24" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#78350F" opacity="0.9">questions together.</text>
    <text x="24" y="225" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#78350F" opacity="0.65">3 steps</text>
  </g>
  <path d="M 630 300 L 660 300" stroke="#9CA3AF" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Phase 3: Pink · Public consolidation -->
  <g transform="translate(665, 180)" filter="url(#cardShadow)">
    <rect width="270" height="240" rx="24" fill="#F472B6"/>
    <text x="24" y="40" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#831843" letter-spacing="1.6" font-weight="600">PHASE / 03</text>
    <line x1="24" y1="52" x2="60" y2="52" stroke="#831843" stroke-width="2" opacity="0.6"/>
    <text x="24" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#831843">Public</text>
    <text x="24" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#831843">consolidation</text>
    <text x="24" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#831843" opacity="0.9">The awarding org</text>
    <text x="24" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#831843" opacity="0.9">republishes one Excel to</text>
    <text x="24" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#831843" opacity="0.9">every bidder.</text>
    <text x="24" y="225" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#831843" opacity="0.65">2 steps</text>
  </g>
  <path d="M 940 300 L 970 300" stroke="#9CA3AF" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Phase 4: Violet · Strategic analysis & next round -->
  <g transform="translate(975, 180)" filter="url(#cardShadow)">
    <rect width="270" height="240" rx="24" fill="#A78BFA"/>
    <text x="24" y="40" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#4C1D95" letter-spacing="1.6" font-weight="600">PHASE / 04</text>
    <line x1="24" y1="52" x2="60" y2="52" stroke="#4C1D95" stroke-width="2" opacity="0.6"/>
    <text x="24" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#4C1D95">Strategic</text>
    <text x="24" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#4C1D95">analysis</text>
    <text x="24" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4C1D95" opacity="0.9">Answers reshape the</text>
    <text x="24" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4C1D95" opacity="0.9">tender; new findings can</text>
    <text x="24" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4C1D95" opacity="0.9">spawn new questions.</text>
    <text x="24" y="225" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#4C1D95" opacity="0.65">3 steps</text>
  </g>
  <path d="M 1250 300 L 1280 300" stroke="#9CA3AF" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Phase 5: Emerald · Final bid -->
  <g transform="translate(1285, 180)" filter="url(#cardShadow)">
    <rect width="270" height="240" rx="24" fill="#34D399"/>
    <text x="24" y="40" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#064E3B" letter-spacing="1.6" font-weight="600">PHASE / 05</text>
    <line x1="24" y1="52" x2="60" y2="52" stroke="#064E3B" stroke-width="2" opacity="0.6"/>
    <text x="24" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#064E3B">Final bid</text>
    <text x="24" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#064E3B" opacity="0.9">Team assembles the offer</text>
    <text x="24" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#064E3B" opacity="0.9">and submits it to the</text>
    <text x="24" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#064E3B" opacity="0.9">awarding organization.</text>
    <text x="24" y="225" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#064E3B" opacity="0.65">1 step</text>
  </g>

  <!-- Cycle loop: from Phase 4 bottom back to Phase 2 bottom -->
  <path d="M 1110 420 C 1110 620, 490 620, 490 420"
        stroke="#6B7280" stroke-width="2.5" stroke-dasharray="9 7" fill="none"
        marker-end="url(#arrowDashed)"/>

  <!-- Cycle label pill -->
  <g transform="translate(680, 558)">
    <rect width="240" height="44" rx="22" fill="#0F172A" stroke="#374151" stroke-width="1.5"/>
    <text x="120" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#D1D5DB" text-anchor="middle">
      Q&amp;A rounds repeat 2 to N times
    </text>
  </g>

  <!-- Insight strip below the loop -->
  <g transform="translate(0, 700)">
    <text x="800" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9CA3AF" text-anchor="middle" font-style="italic">
      Three things from this map shaped the product:
    </text>
    <g transform="translate(180, 30)">
      <rect width="380" height="100" rx="14" fill="none" stroke="#374151" stroke-width="1"/>
      <text x="20" y="32" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#9CA3AF" letter-spacing="1.4" font-weight="600">CYCLE</text>
      <text x="20" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#E5E7EB" font-weight="500">Bursty, not linear.</text>
      <text x="20" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9CA3AF">Multiple rounds, compressing deadlines.</text>
    </g>
    <g transform="translate(610, 30)">
      <rect width="380" height="100" rx="14" fill="none" stroke="#374151" stroke-width="1"/>
      <text x="20" y="32" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#9CA3AF" letter-spacing="1.4" font-weight="600">GROUND TRUTH</text>
      <text x="20" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#E5E7EB" font-weight="500">Answers supersede documents.</text>
      <text x="20" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9CA3AF">The system has to reflow analysis.</text>
    </g>
    <g transform="translate(1040, 30)">
      <rect width="380" height="100" rx="14" fill="none" stroke="#374151" stroke-width="1"/>
      <text x="20" y="32" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#9CA3AF" letter-spacing="1.4" font-weight="600">VISIBILITY</text>
      <text x="20" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#E5E7EB" font-weight="500">Every question is public.</text>
      <text x="20" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9CA3AF">Competitors read your questions too.</text>
    </g>
  </g>

  <!-- Watermark -->
  <text x="45" y="870" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#4B5563" letter-spacing="1.2">
    FIG 3.1 · TENDER ASSIST RESEARCH · VODAFONE GERMANY
  </text>
</svg>
