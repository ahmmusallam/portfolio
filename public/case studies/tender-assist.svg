<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tender Assist — AI bid review">
  <defs>
    <pattern id="ta-dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.7" fill="#1f1f1f"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="#0a0a0a"/>
  <rect width="800" height="500" fill="url(#ta-dots)" opacity="0.6"/>

  <!-- Corner marks -->
  <g stroke="#525252" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 36 50 L 36 36 L 50 36"/>
    <path d="M 750 36 L 764 36 L 764 50"/>
    <path d="M 36 450 L 36 464 L 50 464"/>
    <path d="M 750 464 L 764 464 L 764 450"/>
  </g>

  <!-- Header -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
    <text x="80" y="95" font-size="13" letter-spacing="3" font-weight="500" fill="#888888">TENDER ASSIST</text>
    <text x="232" y="95" font-size="13" letter-spacing="3" fill="#3a3a3a">·</text>
    <text x="248" y="95" font-size="13" letter-spacing="3" fill="#525252">AI BID REVIEW</text>
    <g transform="translate(640, 78)">
      <rect width="80" height="24" rx="12" fill="none" stroke="#525252"/>
      <text x="18" y="16" font-size="11" letter-spacing="1.5" fill="#d4d4d4">AI ✦</text>
    </g>
    <line x1="80" y1="116" x2="720" y2="116" stroke="#1a1a1a"/>
  </g>

  <!-- Column labels -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" transform="translate(80, 152)">
    <text x="36" y="0" font-size="10" letter-spacing="2" fill="#525252">TENDER</text>
    <text x="436" y="0" font-size="10" letter-spacing="2" fill="#525252">RISK</text>
    <text x="600" y="0" font-size="10" letter-spacing="2" fill="#525252">SCORE</text>
  </g>

  <!-- Rows -->
  <g transform="translate(80, 168)" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">

    <!-- Row 1: LOW -->
    <g>
      <rect x="0" y="2" width="22" height="28" rx="2" fill="none" stroke="#404040"/>
      <line x1="6" y1="10" x2="16" y2="10" stroke="#525252"/>
      <line x1="6" y1="16" x2="16" y2="16" stroke="#525252"/>
      <line x1="6" y1="22" x2="12" y2="22" stroke="#525252"/>
      <rect x="40" y="8" width="220" height="7" rx="1" fill="#404040"/>
      <rect x="40" y="21" width="130" height="5" rx="1" fill="#262626"/>
      <circle cx="440" cy="16" r="5" fill="#fafafa"/>
      <text x="456" y="20" font-size="11" letter-spacing="1" fill="#d4d4d4">LOW</text>
      <text x="600" y="22" font-size="16" font-weight="600" fill="#fafafa">94</text>
      <line x1="0" y1="48" x2="640" y2="48" stroke="#1a1a1a"/>
    </g>

    <!-- Row 2: REVIEW -->
    <g transform="translate(0, 60)">
      <rect x="0" y="2" width="22" height="28" rx="2" fill="none" stroke="#404040"/>
      <line x1="6" y1="10" x2="16" y2="10" stroke="#525252"/>
      <line x1="6" y1="16" x2="16" y2="16" stroke="#525252"/>
      <line x1="6" y1="22" x2="12" y2="22" stroke="#525252"/>
      <rect x="40" y="8" width="190" height="7" rx="1" fill="#404040"/>
      <rect x="40" y="21" width="110" height="5" rx="1" fill="#262626"/>
      <circle cx="440" cy="16" r="5" fill="#a3a3a3"/>
      <text x="456" y="20" font-size="11" letter-spacing="1" fill="#a3a3a3">REVIEW</text>
      <text x="600" y="22" font-size="16" font-weight="600" fill="#d4d4d4">71</text>
      <line x1="0" y1="48" x2="640" y2="48" stroke="#1a1a1a"/>
    </g>

    <!-- Row 3: FLAGGED -->
    <g transform="translate(0, 120)">
      <rect x="0" y="2" width="22" height="28" rx="2" fill="none" stroke="#404040"/>
      <line x1="6" y1="10" x2="16" y2="10" stroke="#525252"/>
      <line x1="6" y1="16" x2="16" y2="16" stroke="#525252"/>
      <line x1="6" y1="22" x2="12" y2="22" stroke="#525252"/>
      <rect x="40" y="8" width="210" height="7" rx="1" fill="#404040"/>
      <rect x="40" y="21" width="96" height="5" rx="1" fill="#262626"/>
      <circle cx="440" cy="16" r="5" fill="none" stroke="#666666" stroke-width="1.6"/>
      <text x="456" y="20" font-size="11" letter-spacing="1" fill="#888888">FLAGGED</text>
      <text x="600" y="22" font-size="16" font-weight="600" fill="#888888">48</text>
      <line x1="0" y1="48" x2="640" y2="48" stroke="#1a1a1a"/>
    </g>

    <!-- Ghost row -->
    <g transform="translate(0, 180)" opacity="0.5">
      <rect x="0" y="2" width="22" height="28" rx="2" fill="none" stroke="#262626"/>
      <rect x="40" y="11" width="150" height="8" rx="1" fill="#1a1a1a"/>
      <circle cx="440" cy="16" r="5" fill="none" stroke="#262626" stroke-width="1.5"/>
      <rect x="600" y="11" width="28" height="8" rx="1" fill="#1a1a1a"/>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="470" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="10" letter-spacing="3" fill="#3a3a3a">BID MANAGEMENT · 01</text>
</svg>
