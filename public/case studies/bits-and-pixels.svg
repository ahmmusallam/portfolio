<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bits and Pixels — gamified learning path">
  <defs>
    <pattern id="bp-dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.7" fill="#1f1f1f"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="#0a0a0a"/>
  <rect width="800" height="500" fill="url(#bp-dots)" opacity="0.6"/>

  <!-- Corner marks -->
  <g stroke="#525252" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 36 50 L 36 36 L 50 36"/>
    <path d="M 750 36 L 764 36 L 764 50"/>
    <path d="M 36 450 L 36 464 L 50 464"/>
    <path d="M 750 464 L 764 464 L 764 450"/>
  </g>

  <!-- Header -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
    <text x="80" y="95" font-size="13" letter-spacing="3" font-weight="500" fill="#888888">BITS · PIXELS</text>
    <text x="216" y="95" font-size="13" letter-spacing="3" fill="#3a3a3a">·</text>
    <text x="232" y="95" font-size="13" letter-spacing="3" fill="#525252">LEARN TO CODE</text>
    <line x1="80" y1="116" x2="720" y2="116" stroke="#1a1a1a"/>
  </g>

  <!-- Progression label -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" transform="translate(80, 154)">
    <text x="0" y="14" font-size="10" letter-spacing="2" fill="#666666">PROGRESS</text>
    <text x="98" y="14" font-size="10" letter-spacing="2" fill="#a3a3a3">02 / 05 COMPLETE</text>
    <text x="540" y="14" font-size="10" letter-spacing="2" fill="#525252">REVIEW MY KNOWLEDGE ↗</text>
  </g>

  <!-- Path connector line through middle of tiles -->
  <line x1="160" y1="290" x2="640" y2="290" stroke="#262626" stroke-width="1.5"/>
  <!-- Completed segment (brighter) -->
  <line x1="160" y1="290" x2="382" y2="290" stroke="#666666" stroke-width="1.5"/>

  <!-- 5 lesson tiles -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">

    <!-- Tile 01 — completed -->
    <g transform="translate(98, 222)">
      <!-- Pixel glyph (4x4) above -->
      <g fill="#a3a3a3" transform="translate(38, -38)">
        <rect x="0" y="0" width="6" height="6"/>
        <rect x="8" y="0" width="6" height="6"/>
        <rect x="0" y="8" width="6" height="6"/>
        <rect x="16" y="8" width="6" height="6"/>
        <rect x="8" y="16" width="6" height="6"/>
        <rect x="16" y="16" width="6" height="6"/>
      </g>
      <!-- Tile -->
      <rect width="124" height="136" fill="#161616" stroke="#404040"/>
      <text x="14" y="26" font-size="9" letter-spacing="2" fill="#666666">LESSON 01</text>
      <text x="14" y="90" font-size="34" font-weight="600" fill="#fafafa">01</text>
      <!-- check status -->
      <text x="14" y="118" font-size="11" letter-spacing="1.5" fill="#a3a3a3">✓ COMPLETE</text>
    </g>

    <!-- Tile 02 — completed -->
    <g transform="translate(222, 222)">
      <g fill="#a3a3a3" transform="translate(38, -38)">
        <rect x="0" y="0" width="6" height="6"/>
        <rect x="16" y="0" width="6" height="6"/>
        <rect x="8" y="8" width="6" height="6"/>
        <rect x="0" y="16" width="6" height="6"/>
        <rect x="8" y="16" width="6" height="6"/>
        <rect x="16" y="16" width="6" height="6"/>
      </g>
      <rect width="124" height="136" fill="#161616" stroke="#404040"/>
      <text x="14" y="26" font-size="9" letter-spacing="2" fill="#666666">LESSON 02</text>
      <text x="14" y="90" font-size="34" font-weight="600" fill="#fafafa">02</text>
      <text x="14" y="118" font-size="11" letter-spacing="1.5" fill="#a3a3a3">✓ COMPLETE</text>
    </g>

    <!-- Tile 03 — current (highlighted) -->
    <g transform="translate(346, 222)">
      <g fill="#fafafa" transform="translate(38, -38)">
        <rect x="0" y="0" width="6" height="6"/>
        <rect x="16" y="0" width="6" height="6"/>
        <rect x="8" y="8" width="6" height="6"/>
        <rect x="0" y="16" width="6" height="6"/>
        <rect x="8" y="16" width="6" height="6"/>
        <rect x="16" y="16" width="6" height="6"/>
      </g>
      <rect width="124" height="136" fill="#1c1c1c" stroke="#fafafa"/>
      <text x="14" y="26" font-size="9" letter-spacing="2" fill="#888888">LESSON 03</text>
      <text x="14" y="90" font-size="34" font-weight="600" fill="#fafafa">03</text>
      <text x="14" y="118" font-size="11" letter-spacing="1.5" fill="#fafafa">▶ IN PROGRESS</text>
    </g>

    <!-- Tile 04 — locked -->
    <g transform="translate(470, 222)">
      <g fill="#404040" transform="translate(38, -38)">
        <rect x="8" y="0" width="6" height="6"/>
        <rect x="0" y="8" width="6" height="6"/>
        <rect x="16" y="8" width="6" height="6"/>
        <rect x="8" y="16" width="6" height="6"/>
      </g>
      <rect width="124" height="136" fill="none" stroke="#262626"/>
      <text x="14" y="26" font-size="9" letter-spacing="2" fill="#404040">LESSON 04</text>
      <text x="14" y="90" font-size="34" font-weight="600" fill="#525252">04</text>
      <text x="14" y="118" font-size="11" letter-spacing="1.5" fill="#525252">⎯ LOCKED</text>
    </g>

    <!-- Tile 05 — locked -->
    <g transform="translate(594, 222)">
      <g fill="#404040" transform="translate(38, -38)">
        <rect x="0" y="0" width="6" height="6"/>
        <rect x="16" y="0" width="6" height="6"/>
        <rect x="8" y="8" width="6" height="6"/>
        <rect x="0" y="16" width="6" height="6"/>
        <rect x="16" y="16" width="6" height="6"/>
      </g>
      <rect width="124" height="136" fill="none" stroke="#262626"/>
      <text x="14" y="26" font-size="9" letter-spacing="2" fill="#404040">LESSON 05</text>
      <text x="14" y="90" font-size="34" font-weight="600" fill="#525252">05</text>
      <text x="14" y="118" font-size="11" letter-spacing="1.5" fill="#525252">⎯ LOCKED</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="430" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="10" letter-spacing="3" fill="#3a3a3a">LEARNING PATH · 05</text>
</svg>
